apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/Ravanan/argo-cd-deployment-with-eks.git
      targetRevision: feature/argocd-within-minikube
      path: redis-extras
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: redis
      targetRevision: 20.6.2
      helm:
        values: |
          global:
            storageClass: ebs-gp3-csi
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/redis
            tag: 7.4.2-debian-12-r0
          auth:
            password: R@d1sP@$$w0rd
          master:
            persistence:
              enabled: true
              storageClass: ebs-gp3-csi
              size: 4Gi
          replica:
            replicaCount: 2
            persistence:
              enabled: true
              storageClass: ebs-gp3-csi
              size: 4Gi
  destination:
    server: https://9B993B8D3EFC45F9E25D4B662C01F759.gr7.ap-southeast-2.eks.amazonaws.com
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
